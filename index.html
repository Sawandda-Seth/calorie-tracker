<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-2xl mx-auto p-6">

        <h1 class="text-4xl font-bold text-center text-green-600 mb-8">
            Calorie Counter
        </h1>

        <!-- Form -->
        <form id="foodForm" class="bg-white p-5 rounded-lg shadow-md mb-5">

            <input
                type="text"
                id="foodName"
                placeholder="Food Name"
                class="w-full border p-3 rounded mb-3"
                required
            >

            <input
                type="number"
                id="foodCalories"
                placeholder="Calories"
                class="w-full border p-3 rounded mb-3"
                required
            >

            <button
                class="bg-amber-500 text-white px-5 py-2 rounded hover:bg-green-600">
                Add Food
            </button>

        </form>

        <!-- Suggested Foods -->
        <div class="bg-white p-5 rounded-lg shadow-md mb-5">
            <h2 class="font-bold text-lg mb-3">
                Sample Foods From API
            </h2>

            <div id="foodSuggestions"></div>
        </div>

        <!-- Food List -->
        <div class="bg-white p-5 rounded-lg shadow-md">

            <h2 class="text-xl font-bold mb-3">
                Today's Food Items
            </h2>

            <ul id="foodList"></ul>

            <div class="mt-5">
                <h3 class="text-2xl font-bold">
                    Total Calories:
                    <span id="totalCalories">0</span>
                </h3>
            </div>

            <button
                id="resetBtn"
                class="mt-4 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                Reset Day
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
